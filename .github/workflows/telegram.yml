name: Smart Daily Telegram Prompt

on:
  schedule:
    - cron: '30 0 * * *'   # 6:00 AM IST
    - cron: '30 13 * * *'  # 7:00 PM IST
  workflow_dispatch:

jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate Message
        id: prompt
        run: |
          HOUR=01
          DATE=$(date "+%d %B %Y")

          # рҹҢ… MORNING MESSAGE
          if [ "$HOUR" -lt 12 ]; then

            DAY=$(date +%u)

            if [ "$DAY" -eq 1 ]; then FILE="prompts/journal.txt"
            elif [ "$DAY" -eq 2 ]; then FILE="prompts/motivation.txt"
            elif [ "$DAY" -eq 3 ]; then FILE="prompts/deep.txt"
            elif [ "$DAY" -eq 4 ]; then FILE="prompts/journal.txt"
            elif [ "$DAY" -eq 5 ]; then FILE="prompts/motivation.txt"
            elif [ "$DAY" -eq 6 ]; then FILE="prompts/deep.txt"
            else FILE="prompts/journal.txt"
            fi

            MESSAGE=$(shuf -n 1 "$FILE")

            CTA=$(awk 'BEGIN{RS="";ORS="\n\n"}{print}' prompts/cta.txt | shuf -n 1)

            FINAL=$(printf "рҹҢ… Good Morning!\n\nрҹ“… %s\n\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nрҹ“Ң TODAYвҖҷS FOCUS\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n\n%s\n\n%s" \
              "$DATE" "$MESSAGE" "$CTA")

          else
            # рҹҢҷ EVENING MESSAGE (FIXED WITH csplit)

            INTRO=("рҹҢҷ Time to Reflect" "рҹ§ҫ End Your Day Strong" "рҹ“Ҡ Daily Check-In")
            RANDOM_INTRO=${INTRO[$RANDOM % ${#INTRO[@]}]}

            # вң… BULLETPROOF BLOCK SPLIT
            csplit -s -f part_ prompts/endday.txt '/---/' '{*}' >/dev/null 2>&1

            FILES=(part_*)
            RANDOM_FILE=${FILES[$RANDOM % ${#FILES[@]}]}

            ENDDAY=$(cat "$RANDOM_FILE")

            rm part_*

            FINAL=$(printf "%s\n\nрҹ“… %s\n\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nрҹҢҷ END OF DAY REFLECTION\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n\n%s" \
              "$RANDOM_INTRO" "$DATE" "$ENDDAY")

          fi

          echo "msg<<EOF" >> $GITHUB_OUTPUT
          echo "$FINAL" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Telegram Message
        run: |
          IFS=',' read -ra IDS <<< "${{ secrets.TELEGRAM_CHAT_IDS }}"

          MESSAGE=$(printf "%s" "${{ steps.prompt.outputs.msg }}")

          for CHAT_ID in "${IDS[@]}"
          do
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              --data-urlencode "chat_id=$CHAT_ID" \
              --data-urlencode "text=$MESSAGE"
          done
