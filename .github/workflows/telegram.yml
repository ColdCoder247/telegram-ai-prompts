name: Smart Daily Telegram Prompt

on:
  schedule:
    - cron: '30 0 * * *'  # 6 AM IST
  workflow_dispatch:

jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate Smart Prompt
        id: prompt
        run: |
          DAY=$(date +%u)

          # Category selection
          if [ "$DAY" -eq 1 ]; then FILE="prompts/journal.txt"; CATEGORY="📝 JOURNAL"
          elif [ "$DAY" -eq 2 ]; then FILE="prompts/motivation.txt"; CATEGORY="🚀 MOTIVATION"
          elif [ "$DAY" -eq 3 ]; then FILE="prompts/deep.txt"; CATEGORY="🧠 DEEP THINKING"
          elif [ "$DAY" -eq 4 ]; then FILE="prompts/journal.txt"; CATEGORY="📝 JOURNAL"
          elif [ "$DAY" -eq 5 ]; then FILE="prompts/motivation.txt"; CATEGORY="🚀 MOTIVATION"
          elif [ "$DAY" -eq 6 ]; then FILE="prompts/deep.txt"; CATEGORY="🧠 DEEP THINKING"
          else FILE="prompts/journal.txt"; CATEGORY="🌟 SUNDAY REFLECTION"
          fi

          # Random prompt
          MESSAGE=$(shuf -n 1 "$FILE")

          # Random intro
          INTRO=("🌅 Good Morning!" "🚀 Rise & Win!" "🔥 New Day, New Power!")
          RANDOM_INTRO=${INTRO[$RANDOM % ${#INTRO[@]}]}

          # Date
          DATE=$(date "+%d %B %Y")

          # Random CTA block
          CTA=$(awk 'BEGIN{RS="";ORS="\n\n"}{print}' prompts/cta.txt | shuf -n 1)

          # Final formatted message
          FINAL=$(printf "%s\n\n📅 %s\n\n━━━━━━━━━━━━━━━\n%s PROMPT\n━━━━━━━━━━━━━━━\n\n%s\n\n%s" \
            "$RANDOM_INTRO" "$DATE" "$CATEGORY" "$MESSAGE" "$CTA")

          echo "msg<<EOF" >> $GITHUB_OUTPUT
          echo "$FINAL" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Telegram Message to Multiple Groups
        run: |
          IFS=',' read -ra IDS <<< "${{ secrets.TELEGRAM_CHAT_IDS }}"

          MESSAGE=$(printf "%s" "${{ steps.prompt.outputs.msg }}")

          for CHAT_ID in "${IDS[@]}"
          do
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              --data-urlencode "chat_id=$CHAT_ID" \
              --data-urlencode "text=$MESSAGE"
          done
