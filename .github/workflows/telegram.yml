- name: Generate Smart Prompt
  id: prompt
  run: |
    DAY=$(date +%u)

    if [ "$DAY" -eq 1 ]; then FILE="prompts/journal.txt"; CATEGORY="рџ“қ JOURNAL"
    elif [ "$DAY" -eq 2 ]; then FILE="prompts/motivation.txt"; CATEGORY="рџљЂ MOTIVATION"
    elif [ "$DAY" -eq 3 ]; then FILE="prompts/deep.txt"; CATEGORY="рџ§  DEEP THINKING"
    elif [ "$DAY" -eq 4 ]; then FILE="prompts/journal.txt"; CATEGORY="рџ“қ JOURNAL"
    elif [ "$DAY" -eq 5 ]; then FILE="prompts/motivation.txt"; CATEGORY="рџљЂ MOTIVATION"
    elif [ "$DAY" -eq 6 ]; then FILE="prompts/deep.txt"; CATEGORY="рџ§  DEEP THINKING"
    else FILE="prompts/journal.txt"; CATEGORY="рџЊџ SUNDAY REFLECTION"
    fi

    MESSAGE=$(shuf -n 1 "$FILE")

    INTRO=("рџЊ… Good Morning!" "рџљЂ Rise & Win!" "рџ”Ө New Day, New Power!")
    RANDOM_INTRO=${INTRO[$RANDOM % ${#INTRO[@]}]}

    DATE=$(date "+%d %B %Y")

    # Safe CTA pick
    CTA=$(awk 'BEGIN{RS="";ORS="\n\n"}{print}' prompts/cta.txt | shuf -n 1)

    FINAL=$(printf "%s\n\nрџ“… %s\n\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n%s PROMPT\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n\n%s\n\n%s" \
      "$RANDOM_INTRO" "$DATE" "$CATEGORY" "$MESSAGE" "$CTA")

    echo "msg<<EOF" >> $GITHUB_OUTPUT
    echo "$FINAL" >> $GITHUB_OUTPUT
    echo "EOF" >> $GITHUB_OUTPUT
